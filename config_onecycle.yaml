# Fast Training with OneCycleLR
# Optimized for rapid convergence

# Data
manifest: data/processed/class2/manifest.csv
stack_depth: 5

# Training
batch_size: 16
epochs: 100
lr: 0.0001  # 1e-4 (will reach 10x this as max)
loss: dice_bce

# Model
model: simple_unet

# OneCycle Scheduler (Recommended for fast training)
scheduler: onecycle
scheduler_max_lr_mult: 10.0  # Max LR = lr * 10
scheduler_warmup_pct: 0.3    # 30% warmup phase
scheduler_div_factor: 25.0
scheduler_final_div_factor: 10000.0

# Checkpointing
output_dir: checkpoints
save_every: 5
resume: null

# Visualization
vis_every: 10  # Less frequent for faster training
num_vis_samples: 4

# System
num_workers: 4

