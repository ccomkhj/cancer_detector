extends:
  - ../preset/segmentation_train.yaml

data:
  metadata: data/aligned_v2/metadata.json
  split_file: data/splits/smoke_3case.yaml
  modalities: [t2, adc, calc]
  zero_pad_missing: true
  stack_depth: 3
  num_workers: 0

model:
  name: simple_unet
  params:
    in_channels: 5
    out_channels: 2

train:
  batch_size: 1
  epochs: 1

tracking:
  wandb:
    enabled: false
