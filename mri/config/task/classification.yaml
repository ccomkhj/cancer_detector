task:
  name: classification
  stage: train

data:
  metadata: data/aligned_v2/metadata.json
  split_file: data/splits/cls_cases.yaml
  modalities: [t2, adc, calc]
  zero_pad_missing: true
  seg_pred_dir: data/seg_preds
  selection:
    method: center_crop_pad
    source: hybrid
    jitter: 2
    min_prob: 0.3
  depth:
    strategy: center_crop_pad
    depth: 16
  roi:
    crop_size: 192
    output_size: 256
    use_roi: true

model:
  name: swin
  params:
    in_channels: 3
    num_classes: 5
    spatial_dims: 3

train:
  batch_size: 2
  epochs: 50
  lr: 1e-4
  weight_decay: 1e-4
  output_dir: checkpoints/cls

loss:
  name: cross_entropy

metrics:
  names: [accuracy, macro_f1]
