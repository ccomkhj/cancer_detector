# Training Configuration for 2.5D Multi-Class Segmentation
# This file contains all training parameters.
# CLI arguments override these values.

# ===========================
# Data
# ===========================
manifest: data/processed/class2/manifest.csv
stack_depth: 5  # Number of slices to stack (2.5D)

# ===========================
# Training
# ===========================
batch_size: 32
epochs: 50
lr: 0.00005  # 5e-5
loss: dice_bce  # Options: dice, bce, dice_bce

# ===========================
# Model
# ===========================
model: simple_unet

# ===========================
# Learning Rate Scheduler
# ===========================
# Options: none, reduce_on_plateau, cosine, cosine_simple, onecycle, step, exponential
scheduler: reduce_on_plateau

# ReduceLROnPlateau settings
scheduler_factor: 0.5
scheduler_patience: 5

# Cosine Annealing with Warm Restarts settings
scheduler_t0: 10
scheduler_tmult: 2

# Cosine schedulers min LR
scheduler_min_lr: 0.0000001  # 1e-7

# OneCycleLR settings
scheduler_max_lr_mult: 10.0
scheduler_warmup_pct: 0.3
scheduler_div_factor: 25.0
scheduler_final_div_factor: 10000.0

# StepLR settings
scheduler_step_size: 10

# ===========================
# Checkpointing
# ===========================
output_dir: checkpoints
save_every: 5  # Save checkpoint every N epochs
resume: null  # Path to checkpoint to resume from

# ===========================
# Visualization
# ===========================
vis_every: 5  # Save validation visualizations every N epochs
num_vis_samples: 4  # Number of validation samples to visualize

# ===========================
# System
# ===========================
num_workers: 4

# ===========================
# Recommended Configurations
# ===========================

# Fast training with OneCycle:
# scheduler: onecycle
# lr: 0.0001
# scheduler_max_lr_mult: 10

# Conservative stable training:
# scheduler: reduce_on_plateau
# scheduler_patience: 5
# scheduler_factor: 0.5

# Experimental with warm restarts:
# scheduler: cosine
# scheduler_t0: 10
# scheduler_tmult: 2

