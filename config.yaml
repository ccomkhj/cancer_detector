# Training Configuration for 2.5D Multi-Class Segmentation
# This file contains all training parameters.
# CLI arguments override these values.

# ===========================
# Data Configuration
# ===========================
manifest: data/processed/class2/manifest.csv
stack_depth: 5  # Number of slices to stack (2.5D)

# ===========================
# Training Configuration
# ===========================
batch_size: 8
epochs: 20
lr: 0.00005  # 5e-5
loss: dice_bce  # Options: dice, bce, dice_bce, focal_tversky

# ===========================
# Focal-Tversky Loss Configuration
# ===========================
# Only used when loss: focal_tversky
ft_gamma: 1.33  # Focal parameter (reduces loss for easy examples)
ft_alpha: [0.6, 0.8, 0.8]  # Alpha per class [prostate, target1, target2] - controls FN penalty
ft_beta: [0.4, 0.2, 0.2]   # Beta per class [prostate, target1, target2] - controls FP penalty
ft_class_weights: [1.0, 2.0, 2.0]  # Class weights [prostate, target1, target2] - handles class imbalance

# ===========================
# Model Configuration
# ===========================
model: simple_unet  # Options: simple_unet

# ===========================
# Learning Rate Scheduler Configuration
# ===========================
# Options: none, reduce_on_plateau, cosine, cosine_simple, onecycle, step, exponential
scheduler: reduce_on_plateau

# ReduceLROnPlateau settings
scheduler_factor: 0.5       # Factor to multiply LR by when plateau detected
scheduler_patience: 5       # Number of epochs to wait before reducing LR

# Cosine Annealing with Warm Restarts settings
scheduler_t0: 10            # Number of epochs for first restart cycle
scheduler_tmult: 2          # Multiply T_0 by this factor after each restart

# Cosine schedulers minimum LR
scheduler_min_lr: 0.0000001  # 1e-7

# OneCycleLR settings (very effective for fast convergence)
scheduler_max_lr_mult: 10.0  # Max LR = lr * mult (e.g., 5e-4 for lr=5e-5)
scheduler_warmup_pct: 0.3    # Percentage of cycle for warmup (0.3 = 30%)
scheduler_div_factor: 25.0   # Initial LR divisor (initial_lr = max_lr / div_factor)
scheduler_final_div_factor: 10000.0  # Final LR divisor

# StepLR settings
scheduler_step_size: 10      # Reduce LR every N epochs

# ===========================
# Checkpointing & Resume
# ===========================
output_dir: checkpoints
resume: null  # Path to checkpoint to resume from (e.g., checkpoints/755384/model_best_755384_25.pt)

# ===========================
# Visualization & Monitoring
# ===========================
vis_every: 10         # Save validation visualizations every N epochs (increase to reduce cache)
num_vis_samples: 2    # Number of validation samples to visualize (reduce to save space)
thr_sweep_every: 5    # Perform threshold sweep every N epochs (increase to reduce cache)

# ===========================
# System Configuration
# ===========================
num_workers: 4  # Number of data loading workers (reduce if memory issues)

# ===========================
# Weights & Biases (Wandb) Configuration
# ===========================
wandb: true  # Enable wandb logging
wandb_project: mri-segmentation  # Wandb project name
wandb_entity: null  # Wandb entity/username (leave null for personal account)
wandb_run_name: null  # Wandb run name (auto-generated if null)

# ===========================
# Comprehensive Configuration Examples
# ===========================

